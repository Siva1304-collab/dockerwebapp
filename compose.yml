version: "3.8"

services:

  devopsdb:
    image: siva1304/automation:db
    ports:
      - "3306:3306"

    networks:
      - automation_net

    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  application:
    image: siva1304/automation:app
    ports:
      - "1111:8080"

    networks:
      - automation_net

    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

    depends_on:
      - devopsdb

networks:
  automation_net:
    driver: overlay
